<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Landing Premium</title>

  <style>
    :root {
      --bg: #0f172a; /* colore sfondo (modifica qui) */
      --card: rgba(255, 255, 255, 0.05);
      --border: rgba(255, 255, 255, 0.1);
      --text: #ffffff;
      --accent: #3b82f6;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    body {
      height: 100vh;
      background: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      text-align: center;
      max-width: 1000px;
      width: 100%;
      padding: 20px;
    }

    h1 {
      font-size: 2.5rem;
      font-weight: 600;
      margin-bottom: 10px;
      letter-spacing: -0.5px;
    }

    p {
      opacity: 0.7;
      margin-bottom: 50px;
    }

    .logos {
      display: flex;
      justify-content: center;
      gap: 30px;
      flex-wrap: wrap;
    }

    .logo-card {
      width: 160px;
      height: 160px;
      border-radius: 20px;
      background: var(--card);
      border: 1px solid var(--border);
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .logo-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at top, rgba(255,255,255,0.15), transparent 70%);
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .logo-card:hover::before {
      opacity: 1;
    }

    .logo-card:hover {
      transform: translateY(-8px) scale(1.03);
      border-color: rgba(255,255,255,0.25);
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }

    .logo-card img {
      max-width: 80px;
      max-height: 80px;
      filter: brightness(1) contrast(1.1);
      transition: transform 0.3s ease;
    }

    .logo-card:hover img {
      transform: scale(1.1);
    }

    .logo-link {
      text-decoration: none;
    }

    /* animazione entrata */
    .logo-card {
      animation: fadeUp 0.8s ease forwards;
      opacity: 0;
    }

    .logo-card:nth-child(1) { animation-delay: 0.2s; }
    .logo-card:nth-child(2) { animation-delay: 0.4s; }
    .logo-card:nth-child(3) { animation-delay: 0.6s; }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* mobile */
    @media (max-width: 600px) {
      h1 {
        font-size: 2rem;
      }

      .logo-card {
        width: 130px;
        height: 130px;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Scegli la tua destinazione</h1>
    <p>Seleziona uno dei seguenti siti</p>

    <div class="logos">

      <!-- LOGO 1 -->
      <a class="logo-link" href="https://www.sito1.com" target="_blank">
        <div class="logo-card">
          <img src="logo1.png" alt="Sito 1">
        </div>
      </a>

      <!-- LOGO 2 -->
      <a class="logo-link" href="https://www.doubleexhome.com" target="_blank">
        <div class="logo-card">
          <img src="Logo Double Ex Home.png" alt="Sito 2">
        </div>
      </a>

      <!-- LOGO 3 -->
      <a class="logo-link" href="https://www.sito3.com" target="_blank">
        <div class="logo-card">
          <img src="logo3.png" alt="Sito 3">
        </div>
      </a>

    </div>
  </div>
</body>
</html>
