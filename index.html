<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Landing Premium</title>

  <style>
    :root {
      --bg: #0f172a;
      --card: rgba(255, 255, 255, 0.05);
      --border: rgba(255, 255, 255, 0.12);
      --text: #ffffff;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    body {
      height: 100vh;
      background: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      text-align: center;
      width: 100%;
      max-width: 900px;
      padding: 20px;
    }

    h1 {
      font-size: 2.6rem;
      margin-bottom: 10px;
    }

    p {
      opacity: 0.7;
      margin-bottom: 60px;
    }

    /* PIRAMIDE */
    .pyramid {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 40px;
    }

    .row {
      display: flex;
      gap: 50px;
      justify-content: center;
    }

    .logo-card {
      width: 200px;   /* più grande */
      height: 200px;
      border-radius: 24px;
      background: var(--card);
      border: 1px solid var(--border);
      backdrop-filter: blur(12px);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.35s ease;
      position: relative;
      overflow: hidden;
    }

    /* logo sopra più grande */
    .top {
      width: 230px;
      height: 230px;
    }

    .logo-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at top, rgba(255,255,255,0.2), transparent 70%);
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .logo-card:hover::before {
      opacity: 1;
    }

    .logo-card:hover {
      transform: translateY(-10px) scale(1.05);
      box-shadow: 0 25px 50px rgba(0,0,0,0.5);
      border-color: rgba(255,255,255,0.3);
    }

    .logo-card img {
      max-width: 110px;
      max-height: 110px;
      transition: transform 0.3s ease;
    }

    .top img {
      max-width: 130px;
      max-height: 130px;
    }

    .logo-card:hover img {
      transform: scale(1.12);
    }

    a {
      text-decoration: none;
    }

    /* animazioni */
    .fade {
      opacity: 0;
      transform: translateY(30px);
      animation: fadeUp 0.8s ease forwards;
    }

    .delay1 { animation-delay: 0.2s; }
    .delay2 { animation-delay: 0.4s; }
    .delay3 { animation-delay: 0.6s; }

    @keyframes fadeUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* mobile */
    @media (max-width: 600px) {
      .logo-card {
        width: 150px;
        height: 150px;
      }

      .top {
        width: 180px;
        height: 180px;
      }

      .row {
        gap: 20px;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Scegli la tua destinazione</h1>
    <p>Seleziona uno dei seguenti siti</p>

    <div class="pyramid">

      <!-- TOP -->
      <a href="https://www.sito1.com" target="_blank" class="fade delay1">
        <div class="logo-card top">
          <img src="logo1.png" alt="Sito 1">
        </div>
      </a>

      <!-- BOTTOM ROW -->
      <div class="row">
        <a href="https://www.doubleexhome.com/" target="_blank" class="fade delay2">
          <div class="logo-card">
            <img src="Logo Double Ex Home.png" alt="Sito 2">
          </div>
        </a>

        <a href="https://www.sito3.com" target="_blank" class="fade delay3">
          <div class="logo-card">
            <img src="logo3.png" alt="Sito 3">
          </div>
        </a>
      </div>

    </div>
  </div>
</body>
</html>
