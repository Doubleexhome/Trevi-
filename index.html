<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Landing Premium</title>

  <style>
    :root {
      --bg: #0f172a;
      --text: #ffffff;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    body {
      height: 100vh;
      background: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      text-align: center;
      width: 100%;
      max-width: 1100px;
      padding: 20px;
    }

    h1 {
      font-size: 2.6rem;
      margin-bottom: 10px;
    }

    p {
      opacity: 0.7;
      margin-bottom: 60px;
    }

    .logos {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 80px;
      flex-wrap: wrap;
    }

    .logo {
      transition: all 0.35s ease;
    }

    .logo img {
      width: 180px; /* loghi grandi */
      height: auto;
      transition: all 0.35s ease;
    }

    /* effetto hover premium */
    .logo:hover img {
      transform: scale(1.15);
      filter: brightness(1.2);
    }

    .logo:hover {
      transform: translateY(-10px);
    }

    a {
      text-decoration: none;
    }

    /* animazione entrata */
    .fade {
      opacity: 0;
      transform: translateY(30px);
      animation: fadeUp 0.8s ease forwards;
    }

    .delay1 { animation-delay: 0.2s; }
    .delay2 { animation-delay: 0.4s; }
    .delay3 { animation-delay: 0.6s; }

    @keyframes fadeUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* mobile */
    @media (max-width: 700px) {
      .logos {
        gap: 40px;
      }

      .logo img {
        width: 130px;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Scegli la tua destinazione</h1>
    <p>Seleziona uno dei seguenti siti</p>

    <div class="logos">

      <!-- LOGO 1 -->
      <a href="https://www.sito1.com" target="_blank" class="logo fade delay1">
        <img src="logo1.png" alt="Sito 1">
      </a>

      <!-- LOGO 2 -->
      <a href="https://doubleexhome.com/" target="_blank" class="logo fade delay2">
        <img src="Logo Double Ex Home.png" alt="Sito 2">
      </a>

      <!-- LOGO 3 -->
      <a href="https://dinnerinthesky.it/" target="_blank" class="logo fade delay3">
        <img src="dinner-in-the-sky cop.png" alt="Sito 3">
      </a>

    </div>
  </div>
</body>
</html>
